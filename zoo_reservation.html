<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoo Reservation Form</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style>
        body {
            background: url('zoo_background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            margin-top: 50px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .form-heading img {
            max-width: 100px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        .form-heading h2 {
            letter-spacing: .2rem;
            font-size: 35px;
        }

        form {
            max-width: 600px;
            margin: 0 auto;
        }

        label {
            font-weight: bold;
            font-size: 17px;
        }

        .form-control {
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .form-check-label {
            font-weight: normal;
        }

        button {
            background-color: #28a745;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #218838;
        }

        .information p {
            font-size: 17px;
            font-weight: 500;
            letter-spacing: .5px;
        }

        /* Gradient Scrollbar */
        ::-webkit-scrollbar {
            width: 15px;
        }

        ::-webkit-scrollbar-track {
            background-color: rgb(232, 229, 229);
            box-shadow: rgba(0, 0, 0, 0.24) 0px 3px 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgb(67,238,22);
            background: linear-gradient(114deg, rgba(67,238,22,1) 4%, rgba(123,182,32,1) 40%, rgba(213,251,34,1) 97%);
            border-radius: 1rem;
            border: .1rem solid transparent;
            background-clip: content-box;
        }

    </style>
</head>

<body>

    <div class="container mt-4">
        <div class="form-heading text-center mb-4">
            <img src="zoo_logo.png" alt="Zoo Logo">
            <h2>Zoofari Reservation Form</h2>
        </div>
        <div class="information text-center">
            <p>Per Adult Rs. 50 Per Kid Rs. 30</p>
        </div>
        <form>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="firstName">First Name:</label>
                    <input type="text" class="form-control" id="firstName" placeholder="Enter your first name" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="lastName">Last Name:</label>
                    <input type="text" class="form-control" id="lastName" placeholder="Enter your last name" required>
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number" required>
            </div>
            <div class="form-group">
                <label for="date">Reservation Date:</label>
                <input type="date" class="form-control" id="date" required>
            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="numberOfAdults">Number of Adults:</label>
                    <input type="number" class="form-control" id="numberOfAdults"
                        placeholder="Enter the number of adults" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="numberOfKids">Number of Kids:</label>
                    <input type="number" class="form-control" id="numberOfKids" placeholder="Enter the number of kids"
                        required>
                </div>
            </div>

            <div class="form-group">
                <label for="newsletter" class="font-weight-bold">
                    Would you like to subscribe to our newsletter to learn more about the health of our animals?
                </label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="newsletter" id="subscribeYes" value="yes">
                    <label class="form-check-label" for="subscribeYes">
                        Yes
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="newsletter" id="subscribeNo" value="no">
                    <label class="form-check-label" for="subscribeNo">
                        No
                    </label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Submit Reservation</button>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>

</html>
